[tool.uv.workspace]
members = ["headwater-api", "headwater-client", "headwater-server"]

[tool.uv.sources]
dbclients = { path = "../../../../dbclients-project", editable = true }
headwater_api = { workspace = true }
headwater_client = { workspace = true }
headwater_server = { workspace = true }
siphon_api = { path = "../../../../siphon/siphon-api", editable = true }
siphon_server = { path = "../../../../siphon/siphon-server", editable = true }
conduit = { path = "../../../../conduit-project", editable = true }
kramer = { path = "../../../../kramer-project", editable = true }

[tool.uv]
override-dependencies = [
    "headwater-api @ file:///Users/bianders/Brian_Code/headwater/.worktrees/feature/bywater/headwater-api",
    "headwater-client @ file:///Users/bianders/Brian_Code/headwater/.worktrees/feature/bywater/headwater-client",
]

[tool.pytest.ini_options]
markers = [
    "parser: Parser strategy tests",
    "extractor: Extractor strategy tests",
    "enricher: Enricher strategy tests",
    "integration: Full pipeline integration tests",
    "slow: Tests that take >1 second",
]

addopts = [
    "-v",                    # Verbose output
    "--tb=short",           # Shorter tracebacks
    "--strict-markers",     # Fail on typo in marker names
    "-ra",                  # Show summary of all test outcomes
]

testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
